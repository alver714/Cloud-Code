# gitleaks secret-scan workflow (staged here to avoid needing the gh 'workflow' OAuth scope).
# Activate: mkdir -p .github/workflows && cp scripts/secret-scan.workflow.yml .github/workflows/secret-scan.yml
#          then push (needs: gh auth refresh -s workflow) — or paste it via the GitHub web UI.

name: secret-scan
on: [push, pull_request]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
